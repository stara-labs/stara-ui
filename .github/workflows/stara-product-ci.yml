name: Stara Product CI

on:
  pull_request:
    branches:
      - main
      - dev
      - dev-staging
      - 'release/**'
  push:
    branches:
      - main
      - dev
      - dev-staging
      - 'release/**'
  schedule:
    - cron: '17 7 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: stara-product-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CI: 'true'
  NODE_OPTIONS: '--max-old-space-size=8192'

jobs:
  changes:
    name: Plan unique Stara gates
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      production_audit: ${{ steps.filter.outputs.production_audit }}
      api_integration: ${{ steps.filter.outputs.api_integration }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: filter
        env:
          STARA_CI_FORCE_ALL: ${{ github.event_name != 'pull_request' }}
          STARA_CI_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          STARA_CI_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: node scripts/stara-ci-changes.mjs

  production-dependency-audit:
    name: Production dependency audit
    needs: changes
    if: needs.changes.outputs.production_audit == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Reject high or critical production vulnerabilities
        run: npm run security:audit:production

  api-integration-tests:
    name: API integration tests
    needs: changes
    if: needs.changes.outputs.api_integration == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_TEST_BUCKET_NAME: ${{ secrets.AWS_TEST_BUCKET_NAME }}
      NODE_ENV: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package dependencies
        run: |
          npm run build:data-provider
          npm run build:data-schemas
          npm run build:api

      - name: Run API integration specs
        working-directory: packages/api
        run: npx jest --testPathPatterns="src/.*\\.integration\\.spec\\.ts$" --coverage=false --runInBand --forceExit

  full-suite:
    name: Full suite result
    runs-on: ubuntu-latest
    needs:
      - changes
      - production-dependency-audit
      - api-integration-tests
    if: always()
    steps:
      - name: Fail if a selected Stara gate failed
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          node <<'NODE'
          const needs = JSON.parse(process.env.NEEDS_JSON);
          const accepted = new Set(['success', 'skipped']);
          const failed = Object.entries(needs).filter(([, value]) => !accepted.has(value.result));
          if (failed.length > 0) {
            for (const [name, value] of failed) {
              console.error(`${name}: ${value.result}`);
            }
            process.exit(1);
          }
          console.log('All selected Stara product CI jobs passed.');
          NODE
